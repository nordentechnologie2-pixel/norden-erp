<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>NORDEN | ULTRA ENGINE v13</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #05070a; --panel: #0d1117; --inlay: #ff9f43; --card: #2ea043; --accent: #7d8590; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #e6edf3; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 300px; background: #010409; border-right: 1px solid #30363d; padding: 25px; display: flex; flex-direction: column; }
        .main { flex: 1; overflow-y: auto; padding: 30px; position: relative; }
        
        /* Overlay de Carregamento */
        #loader { display: none; position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; }
        .spinner { width: 50px; height: 50px; border: 5px solid #30363d; border-top-color: var(--inlay); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .kpi { background: var(--panel); border: 1px solid #30363d; padding: 20px; border-radius: 10px; }
        .kpi h4 { margin: 0; font-size: 0.7rem; color: var(--accent); }
        .kpi div { font-size: 1.6rem; font-weight: 900; margin-top: 5px; }

        .panel { background: var(--panel); border: 1px solid #30363d; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        canvas { max-height: 300px; }
        
        .btn-upload { background: #238636; color: white; border: none; padding: 15px; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .btn-upload:disabled { background: #123d1a; cursor: not-allowed; }
        
        table { width: 100%; border-collapse: collapse; font-size: 0.75rem; margin-top: 10px; }
        th { background: #161b22; padding: 10px; text-align: left; color: var(--accent); }
        td { padding: 8px 10px; border-bottom: 1px solid #21262d; }
    </style>
</head>
<body>

<div id="loader">
    <div class="spinner"></div>
    <p id="loadText" style="margin-top:15px; font-weight: bold;">Processando Arquivos...</p>
</div>

<div class="sidebar">
    <h2>NORDEN <span style="font-weight:100">v13</span></h2>
    <p style="font-size:0.7rem; color:var(--accent)">Engine de Processamento Seguro</p>
    <br>
    <button class="btn-upload" id="uploadBtn" onclick="document.getElementById('fileIn').click()">IMPORTAR PLANILHAS</button>
    <input type="file" id="fileIn" multiple style="display:none">
    <div id="status" style="margin-top:20px; font-size:0.75rem; color: var(--card)"></div>
</div>

<div class="main">
    <div class="grid">
        <div class="kpi"><h4>Produção Inlay</h4><div id="k_in" style="color:var(--inlay)">0</div></div>
        <div class="kpi"><h4>Produção Cartão</h4><div id="k_cd" style="color:var(--card)">0</div></div>
        <div class="kpi"><h4>Perda Total</h4><div id="k_loss" style="color:#f85149">0</div></div>
        <div class="kpi"><h4>Yield Global</h4><div id="k_yield">0%</div></div>
    </div>

    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px">
        <div class="panel"><h3>Inlay: Perdas Técnicas</h3><canvas id="c_in"></canvas></div>
        <div class="panel"><h3>Cartão: Perdas Processo</h3><canvas id="c_cd"></canvas></div>
    </div>

    <div class="panel">
        <h3>Auditoria de OPs (Segregado)</h3>
        <table id="tableOps">
            <thead>
                <tr><th>TIPO</th><th>OP</th><th>MODELO</th><th>PROD.</th><th>PERDA</th><th>%</th></tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script>
let store = { inlay: { vol:0, loss:0, reasons:{} }, card: { vol:0, loss:0, reasons:{} }, ops: [] };
let charts = {};

function initCharts() {
    const cfg = (color) => ({ type:'bar', data:{ labels:[], datasets:[{ data:[], backgroundColor:color }] }, options:{ plugins:{legend:{display:false}} } });
    charts.in = new Chart(document.getElementById('c_in'), cfg('#ff9f43'));
    charts.cd = new Chart(document.getElementById('c_cd'), cfg('#2ea043'));
}

document.getElementById('fileIn').addEventListener('change', async (e) => {
    const files = Array.from(e.target.files);
    const btn = document.getElementById('uploadBtn');
    const loader = document.getElementById('loader');
    
    btn.disabled = true;
    loader.style.display = 'flex';

    for (let file of files) {
        document.getElementById('loadText').innerText = `Lendo: ${file.name}`;
        try {
            const data = await file.arrayBuffer();
            const wb = XLSX.read(data, { type: 'array', cellDates: true });
            
            for (let sn of wb.SheetNames) {
                const ws = wb.Sheets[sn];
                // Converte apenas o necessário para economizar RAM
                const rows = XLSX.utils.sheet_to_json(ws, { defval: null, range: ws['!ref'] });
                processRows(rows, sn.toUpperCase());
            }
        } catch (err) {
            console.error("Erro no arquivo:", file.name, err);
        }
    }

    render();
    loader.style.display = 'none';
    btn.disabled = false;
});

function processRows(rows, sheetName) {
    if (!rows || rows.length === 0) return;

    rows.forEach(r => {
        // Ignora linhas de cabeçalho ou vazias
        const qtd = Number(r["QUANTIDADE PRODUZIDA"] || r["QUANTIDADE"] || r["QUANT. EXPEDIDA"] || 0);
        if (qtd <= 0 && !r["Nº DA O.P."]) return;

        const loss = Number(r["TOTAL DE PERDAS"] || r["TOTAL DE ERROS"] || r["PERDAS TOTAIS"] || 0);
        
        // Critério de Separação Robusto
        const isInlay = sheetName.includes("INLAY") || r["LOTE"] || r["PICK AND PLACE"] !== undefined;
        const target = isInlay ? store.inlay : store.card;

        target.vol += qtd;
        target.loss += loss;

        // Mapeamento de Perdas (Pareto)
        const possibleReasons = ["CHIP MORTO", "BOLHA", "SOLDA", "RISCO", "MANCHA", "IMPUREZAS", "ERRO DE ESQUADRO", "PICK AND PLACE"];
        possibleReasons.forEach(res => {
            if (r[res] && Number(r[res]) > 0) {
                target.reasons[res] = (target.reasons[res] || 0) + Number(r[res]);
            }
        });

        // Registro de OP
        if (r["Nº DA O.P."] || r["LOTE"]) {
            store.ops.push({
                t: isInlay ? 'INLAY' : 'CARD',
                op: r["Nº DA O.P."] || r["LOTE"],
                m: r["MODELO"] || r["CLIENTE/MODELO"] || "---",
                p: qtd,
                l: loss
            });
        }
    });
}

function render() {
    document.getElementById('k_in').innerText = store.inlay.vol.toLocaleString();
    document.getElementById('k_cd').innerText = store.card.vol.toLocaleString();
    document.getElementById('k_loss').innerText = (store.inlay.loss + store.card.loss).toLocaleString();
    
    const totalV = store.inlay.vol + store.card.vol;
    const totalL = store.inlay.loss + store.card.loss;
    document.getElementById('k_yield').innerText = totalV > 0 ? (100 - (totalL/totalV*100)).toFixed(2) + "%" : "0%";

    // Atualiza Gráficos
    const updChart = (chart, data) => {
        chart.data.labels = Object.keys(data);
        chart.data.datasets[0].data = Object.values(data);
        chart.update();
    };
    updChart(charts.in, store.inlay.reasons);
    updChart(charts.cd, store.card.reasons);

    // Tabela (Top 20 OPs recentes)
    const tbody = document.querySelector('#tableOps tbody');
    tbody.innerHTML = store.ops.slice(-20).reverse().map(o => `
        <tr>
            <td style="color:${o.t === 'INLAY' ? 'var(--inlay)' : 'var(--card)'}"><b>${o.t}</b></td>
            <td>${o.op}</td>
            <td>${o.m}</td>
            <td>${o.p}</td>
            <td style="color:#f85149">${o.l}</td>
            <td>${o.p > 0 ? (o.l/o.p*100).toFixed(1) : 0}%</td>
        </tr>
    `).join('');
}

initCharts();
</script>
</body>
</html>
