<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>NORDEN | PROFESSIONAL BI v14.1</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0d1117; --panel: #161b22; --inlay: #ff9f43; --card: #2ea043; --danger: #f85149; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #c9d1d9; margin: 0; display: flex; height: 100vh; }
        .sidebar { width: 320px; background: #010409; border-right: 1px solid #30363d; padding: 30px; display: flex; flex-direction: column; gap: 20px; }
        .main { flex: 1; overflow-y: auto; padding: 30px; }
        .kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 25px; }
        .kpi-card { background: var(--panel); border: 1px solid #30363d; padding: 20px; border-radius: 12px; border-top: 4px solid #30363d; }
        .kpi-card small { color: #8b949e; font-size: 0.7rem; font-weight: bold; text-transform: uppercase; }
        .kpi-card div { font-size: 1.8rem; font-weight: 900; margin-top: 5px; }
        .btn-import { background: #238636; color: white; border: none; padding: 15px; border-radius: 8px; font-weight: 900; cursor: pointer; }
        .panel { background: var(--panel); border: 1px solid #30363d; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
        th { text-align: left; padding: 12px; color: #8b949e; border-bottom: 2px solid #30363d; }
        td { padding: 10px; border-bottom: 1px solid #21262d; }
        #loader { display: none; color: var(--inlay); font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="sidebar">
    <h1 style="color:white; margin:0;">NORDEN <span style="color:var(--inlay)">PRO</span></h1>
    <div style="background:var(--inlay); color:black; padding:5px; font-size:0.6rem; font-weight:900; border-radius:4px; text-align:center;">VERSÃO 14.1 - INDUSTRIAL MASTER</div>
    <p style="font-size:0.7rem; color:#8b949e">Motor de busca profunda ativado.</p>
    
    <div id="loader">⚡ PROCESSANDO DADOS...</div>
    <button class="btn-import" onclick="document.getElementById('fileIn').click()">IMPORTAR AGORA</button>
    <input type="file" id="fileIn" multiple style="display:none">
    
    <div id="fileList" style="font-size:0.65rem; color:var(--card); max-height:200px; overflow-y:auto"></div>
</div>

<div class="main">
    <div class="kpi-grid">
        <div class="kpi-card" style="border-top-color:var(--inlay)"><small>Produção Inlays</small><div id="k_inlay">0</div></div>
        <div class="kpi-card" style="border-top-color:var(--card)"><small>Produção Cartões</small><div id="k_card">0</div></div>
        <div class="kpi-card" style="border-top-color:var(--danger)"><small>Total Perdas</small><div id="k_loss">0</div></div>
        <div class="kpi-card"><small>Rendimento Global</small><div id="k_yield">0%</div></div>
    </div>

    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px; margin-bottom:20px">
        <div class="panel"><h3>Perdas Inlay (Pareto)</h3><canvas id="c_inlay"></canvas></div>
        <div class="panel"><h3>Perdas Cartão (Pareto)</h3><canvas id="c_card"></canvas></div>
    </div>

    <div class="panel">
        <h3>Auditoria de Produção Detalhada</h3>
        <table>
            <thead><tr><th>TIPO</th><th>OP/LOTE</th><th>MODELO</th><th>PRODUZIDO</th><th>PERDA</th><th>%</th></tr></thead>
            <tbody id="auditBody"></tbody>
        </table>
    </div>
</div>

<script>
let state = { inlay: { v:0, l:0, r:{} }, card: { v:0, l:0, r:{} }, ops: [] };
let charts = {};

function initCharts() {
    const opt = (c) => ({ type:'bar', data:{ labels:[], datasets:[{data:[], backgroundColor:c}] }, options:{ indexAxis:'y', plugins:{legend:{display:false}} } });
    charts.in = new Chart(document.getElementById('c_inlay'), opt('#ff9f43'));
    charts.cd = new Chart(document.getElementById('c_card'), opt('#2ea043'));
}

document.getElementById('fileIn').addEventListener('change', async (e) => {
    const files = Array.from(e.target.files);
    document.getElementById('loader').style.display = 'block';
    
    for (let f of files) {
        document.getElementById('fileList').innerHTML += `• ${f.name}<br>`;
        const data = await f.arrayBuffer();
        const wb = XLSX.read(data, { type: 'array', cellDates: true });
        
        wb.SheetNames.forEach(sn => {
            const rows = XLSX.utils.sheet_to_json(wb.Sheets[sn], { defval: 0 });
            analyze(rows, sn.toUpperCase());
        });
    }
    
    updateUI();
    document.getElementById('loader').style.display = 'none';
});

function analyze(rows, sheetName) {
    rows.forEach(r => {
        // Normalização de chaves (Mapeia colunas mesmo com nomes zangados)
        const keys = Object.keys(r);
        const getV = (str) => {
            const k = keys.find(key => key.toUpperCase().includes(str));
            return k ? Number(r[k]) : 0;
        };

        const prod = getV("QUANT") || getV("PROD") || getV("EXPED");
        const loss = getV("PERDA") || getV("ERRO") || getV("REFUGO");
        
        if (prod === 0 && loss === 0) return;

        // SEGREGAÇÃO RÍGIDA
        const isInlay = sheetName.includes("INLAY") || keys.some(k => k.includes("PICK") || k.includes("CHIP"));
        const target = isInlay ? state.inlay : state.card;

        target.v += prod;
        target.l += loss;

        // MOTIVOS DE PERDA
        const reasons = isInlay ? ["CHIP MORTO", "PICK AND PLACE", "SOLDA"] : ["BOLHA", "RISCO", "MANCHA", "IMPUREZA", "ESQUADRO"];
        reasons.forEach(m => {
            const val = getV(m);
            if (val > 0) target.r[m] = (target.r[m] || 0) + val;
        });

        if (prod > 0) {
            state.ops.push({
                t: isInlay ? 'INLAY' : 'CARTÃO',
                op: r["Nº DA O.P."] || r["LOTE"] || "---",
                m: r["MODELO"] || r["CLIENTE/MODELO"] || "---",
                q: prod,
                p: loss
            });
        }
    });
}

function updateUI() {
    document.getElementById('k_inlay').innerText = state.inlay.v.toLocaleString();
    document.getElementById('k_card').innerText = state.card.v.toLocaleString();
    document.getElementById('k_loss').innerText = (state.inlay.l + state.card.l).toLocaleString();
    const yield = (100 - ((state.inlay.l + state.card.l) / (state.inlay.v + state.card.v) * 100)).toFixed(2);
    document.getElementById('k_yield').innerText = isNaN(yield) ? "0%" : yield + "%";

    const upd = (chart, data) => {
        const s = Object.entries(data).sort((a,b) => b[1]-a[1]);
        chart.data.labels = s.map(x => x[0]);
        chart.data.datasets[0].data = s.map(x => x[1]);
        chart.update();
    };
    upd(charts.in, state.inlay.r);
    upd(charts.cd, state.card.r);

    document.getElementById('auditBody').innerHTML = state.ops.slice(-20).reverse().map(o => `
        <tr>
            <td style="color:${o.t === 'INLAY' ? 'var(--inlay)' : 'var(--card)'}"><b>${o.t}</b></td>
            <td>${o.op}</td>
            <td>${o.m}</td>
            <td>${o.q.toLocaleString()}</td>
            <td style="color:var(--danger)">${o.p}</td>
            <td>${((o.p/o.q)*100).toFixed(1)}%</td>
        </tr>
    `).join('');
}

initCharts();
</script>
</body>
</html>
